[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/kroger"
  to = "/.netlify/functions/kroger"
  status = 200

[[redirects]]
  from = "/api/revenuecat-webhook"
  to = "/.netlify/functions/revenuecat-webhook"
  status = 200

[[redirects]]
  from = "/api/import-recipe"
  to = "/.netlify/functions/import-recipe"
  status = 200

[[redirects]]
  from = "/kroger-callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/feedback"
  to = "/feedback.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
