<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Nutriq</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@1.2.8/dist/iife/reader/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf8f5;--warm:#f4efe8;--blush:#fdf0f4;--card:#ffffff;
  --border:#ece5dc;--border2:#e0d5e8;--plum:#4a1a6e;--plum2:#6b2fa0;
  --plum3:#8b4fc0;--plumL:#f5eef9;--plumLL:#faf5fd;--rose:#d4537e;
  --roseL:#fbeaf0;--blushD:#c2809a;--sage:#7a9e6e;--sageL:#eef4eb;
  --text:#2a1a3a;--muted:#8a7898;--muted2:#b0a0be;--red:#b5344a;
  --orange:#c2780a;--gold:#c9a227;
}
html,body{background:var(--cream);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;min-height:100vh;-webkit-font-smoothing:antialiased;}
#root{max-width:430px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;overflow-x:hidden;}
::-webkit-scrollbar{width:0;height:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanLine{0%,100%{top:15%}50%{top:78%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(250,248,245,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.logo-bloom{width:34px;height:34px;flex-shrink:0;}
.logo-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;color:var(--plum);letter-spacing:-.3px;line-height:1;}
.logo-tag{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;font-weight:300;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.expiry-chip{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--orange);background:#fdf5e6;border:1px solid #e8c97044;border-radius:20px;padding:4px 10px;}
.expiry-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);animation:pulse 1.4s infinite;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(250,248,245,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px 12px;background:none;border:none;border-top:2px solid transparent;color:var(--muted2);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;transition:color .18s,border-color .18s;}
.nb.on{color:var(--plum);border-top-color:var(--plum);}
.nb svg{width:20px;height:20px;}
.page{padding:22px 18px;padding-bottom:100px;animation:fadeUp .25s ease;min-height:calc(100vh - 58px);}
.page-label{font-size:10px;font-weight:500;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.page-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:600;color:var(--text);letter-spacing:-.5px;margin-bottom:4px;line-height:1.1;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(74,26,110,.05);}
.card-title{font-size:13px;font-weight:500;color:var(--plum);margin-bottom:12px;letter-spacing:.1px;}
.section-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
input,select,textarea{background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;outline:none;width:100%;-webkit-appearance:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--plum3);}
input::placeholder{color:var(--muted2);}
input[type=date]{color:var(--muted);}
.input-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px;}
.btn-full{width:100%;background:linear-gradient(135deg,var(--plum2),var(--plum));border:none;border-radius:14px;padding:15px;color:#fff;font-weight:500;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:.2px;font-size:16px;box-shadow:0 4px 18px rgba(107,47,160,.3);transition:opacity .15s,transform .1s;}
.btn-full:active{opacity:.9;transform:scale(.99);}
.btn-full.red{background:linear-gradient(135deg,#c0392b,#922b21);}
.btn-full.blue{background:linear-gradient(135deg,#3a6fa0,#2c5380);}
.btn-full:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{background:var(--plumL);border:1px solid var(--plum3)44;border-radius:10px;padding:7px 14px;color:var(--plum2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;white-space:nowrap;transition:background .15s;}
.btn-sm:hover{background:var(--plumLL);}
.btn-ghost{width:100%;background:none;border:1px dashed var(--border2);border-radius:12px;padding:11px;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;margin-bottom:12px;transition:border-color .15s;}
.chips{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;margin-bottom:14px;padding-bottom:2px;}
.chips.wrap{flex-wrap:wrap;overflow-x:visible;}
.chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:400;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;}
.chip.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.chip.red{background:var(--roseL);border-color:var(--rose)66;color:var(--rose);font-weight:500;}
.seg{display:flex;background:var(--warm);border:1px solid var(--border);border-radius:14px;padding:4px;gap:4px;margin-bottom:16px;}
.seg-btn{flex:1;padding:10px;border-radius:10px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:500;transition:all .15s;}
.seg-btn.on{background:var(--card);color:var(--plum2);box-shadow:0 1px 6px rgba(74,26,110,.12);}
.seg-btn.red.on{color:var(--red);}
.vf{position:relative;height:210px;background:#1a0f24;border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 6px 24px rgba(74,26,110,.25);}
.vf video{width:100%;height:100%;object-fit:cover;}
.vf-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.vf-frame{position:relative;width:220px;height:130px;}
.vf-corner{position:absolute;width:22px;height:22px;border-color:#e8c0f0;border-style:solid;}
.vf-scan{position:absolute;left:0;right:0;height:1.5px;background:linear-gradient(to right,transparent,#e8c0f0,transparent);animation:scanLine 2.2s ease-in-out infinite;}
.vf-hint{font-size:12px;color:#e8c0f088;letter-spacing:.8px;}
.vf-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
.vf-stop{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);border:none;border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer;font-size:12px;}
.prow{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:13px 14px;border:1px solid var(--border);border-left:3px solid var(--border);margin-bottom:8px;box-shadow:0 1px 3px rgba(74,26,110,.04);transition:transform .1s;}
.prow:active{transform:scale(.995);}
.prow-icon{width:42px;height:42px;border-radius:12px;background:var(--plumLL);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prow-icon svg{width:20px;height:20px;}
.prow-name{font-weight:500;font-size:14px;color:var(--text);margin-bottom:2px;}
.prow-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--muted);margin-bottom:5px;}
.macro-pill{background:var(--warm);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--muted);}
.qty-tag{background:var(--plumL);border:1px solid var(--plum3)33;border-radius:8px;padding:3px 9px;font-size:12px;color:var(--plum2);font-weight:500;white-space:nowrap;}
.btn-use{background:var(--sageL);border:1px solid var(--sage)55;border-radius:8px;padding:5px 11px;color:var(--sage);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;}
.btn-del{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--muted2);font-size:12px;cursor:pointer;}
.result-card{background:var(--card);border:1px solid var(--plum3)44;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 3px 16px rgba(107,47,160,.1);animation:fadeUp .2s ease;}
.result-icon{width:50px;height:50px;border-radius:14px;background:var(--plumLL);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.result-icon svg{width:24px;height:24px;}
.macro-grid{display:flex;gap:8px;margin-bottom:14px;}
.macro-box{flex:1;background:var(--warm);border:1px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center;}
.macro-val{font-weight:500;font-size:15px;color:var(--plum2);}
.macro-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.qty-btn{width:38px;height:38px;background:var(--warm);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.qty-btn:hover{background:var(--plumLL);}
.qty-num{font-size:20px;font-weight:500;min-width:32px;text-align:center;color:var(--plum);}
.alert{background:#fef7ed;border:1px solid #e8c97066;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#8a5a0a;}
.stat-row{display:flex;gap:8px;margin-bottom:20px;}
.stat-pill{background:var(--plumLL);border:1px solid var(--plum3)22;border-radius:20px;padding:5px 13px;font-size:12px;color:var(--plum);}
.bmr-card{background:var(--plumL);border:1px solid var(--plum3)33;border-radius:18px;padding:18px;margin-bottom:14px;}
.bmr-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.bmr-val{font-family:'Cormorant Garamond',Georgia,serif;font-size:32px;font-weight:600;color:var(--plum);line-height:1;}
.bmr-unit{font-size:14px;font-weight:400;color:var(--muted);}
.macro-target-row{display:flex;border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:12px;background:var(--card);}
.macro-target-cell{flex:1;padding:11px 6px;text-align:center;}
.macro-target-cell+.macro-target-cell{border-left:1px solid var(--border2);}
.mtv{font-weight:500;font-size:16px;margin-bottom:2px;}
.mtl{font-size:10px;color:var(--muted);}
.act-row{display:flex;align-items:center;gap:12px;background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;width:100%;font-family:'DM Sans',system-ui,sans-serif;margin-bottom:6px;transition:all .15s;}
.act-row.on{background:var(--plumLL);border-color:var(--plum3)55;}
.pill-btn{background:var(--warm);border:1px solid var(--border);border-radius:20px;padding:7px 16px;color:var(--muted);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:400;transition:all .15s;}
.pill-btn.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.goal-btn{flex:1;background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:11px 6px;color:var(--muted);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;transition:all .15s;}
.goal-btn.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.sparkline{display:flex;align-items:flex-end;gap:4px;height:56px;margin-bottom:14px;}
.spark-bar{width:12px;border-radius:3px;transition:height .4s;}
.spark-lbl{font-size:8px;color:var(--muted2);margin-top:3px;}
.btn-generate{width:100%;background:linear-gradient(135deg,var(--plum2),var(--plum));border:none;border-radius:16px;padding:18px;color:#fff;font-weight:500;font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;letter-spacing:.2px;cursor:pointer;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(107,47,160,.32);transition:opacity .15s;}
.btn-generate:disabled{opacity:.55;cursor:not-allowed;}
.strat-card{display:flex;gap:10px;align-items:flex-start;background:var(--plumLL);border:1px solid var(--plum3)22;border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.6;color:var(--plum);}
.day-btn{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 15px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:400;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;}
.day-btn.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.day-totals{display:flex;gap:8px;margin-bottom:16px;}
.day-total-cell{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(74,26,110,.05);}
.meal-type{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--rose);margin-bottom:6px;}
.meal-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:500;color:var(--text);margin-bottom:5px;}
.meal-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:8px;}
.uses-chip{background:var(--sageL);border:1px solid var(--sage)44;border-radius:6px;padding:2px 8px;font-size:11px;color:var(--sage);}
.pantry-tag{font-size:11px;color:var(--muted);}
.store-btn{flex:1;min-width:78px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;font-size:12px;font-weight:400;transition:all .15s;}
.store-btn.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.shop-summary{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.sum-cell{flex:1;text-align:center;}
.sum-val{font-size:22px;font-weight:500;color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.shop-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 14px;cursor:pointer;margin-bottom:7px;transition:opacity .2s;}
.shop-row.done{opacity:.4;}
.check-ring{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;transition:all .18s;color:transparent;}
.check-ring.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.urgent-tag{background:var(--roseL);border:1px solid var(--rose)44;border-radius:6px;padding:2px 8px;font-size:10px;color:var(--rose);font-weight:500;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--plum);border-radius:14px;padding:12px 22px;color:#fff;font-size:14px;font-weight:400;z-index:999;white-space:nowrap;box-shadow:0 8px 28px rgba(74,26,110,.4);animation:fadeUp .25s ease;}
.toast.err{background:var(--red);}
.spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite;display:inline-block;}
.manual-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;line-height:1.7;}
.empty-icon{margin-bottom:16px;opacity:.4;}
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--cream);padding:0;}
.ob-hero{background:linear-gradient(160deg,var(--plumL) 0%,var(--blush) 100%);padding:60px 28px 40px;text-align:center;}
.ob-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:600;color:var(--plum);margin-bottom:6px;}
.ob-sub{font-size:14px;color:var(--muted);line-height:1.6;}
.ob-body{flex:1;padding:28px 20px;display:flex;flex-direction:column;gap:0;}
.ob-step{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;}
.ob-progress{display:flex;gap:6px;margin-bottom:28px;}
.ob-dot{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s;}
.ob-dot.on{background:var(--plum2);}
.ob-field{margin-bottom:16px;}
.ob-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px;}
.ob-input{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .15s;}
.ob-input:focus{border-color:var(--plum3);}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ob-next{width:100%;background:linear-gradient(135deg,var(--plum2),var(--plum));border:none;border-radius:14px;padding:16px;color:#fff;font-weight:500;font-size:16px;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;letter-spacing:.2px;box-shadow:0 4px 18px rgba(107,47,160,.3);margin-top:auto;transition:opacity .15s;}
.ob-next:disabled{opacity:.4;cursor:not-allowed;}
.ob-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:12px 0;font-family:'DM Sans',system-ui,sans-serif;}
.ob-sel-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.ob-sel-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;}
.ob-sel-btn.on{background:var(--plumL);border-color:var(--plum3);color:var(--plum2);font-weight:500;}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:var(--cream);}
.auth-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;box-shadow:0 4px 24px rgba(74,26,110,.08);}
.auth-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:600;color:var(--plum);margin-bottom:6px;text-align:center;}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;}
.auth-switch{font-size:13px;color:var(--muted);text-align:center;margin-top:16px;}
.auth-switch span{color:var(--plum2);cursor:pointer;font-weight:500;}
.auth-err{background:var(--roseL);border:1px solid var(--rose)44;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;}
/* ── MEAL OPTIONS ── */

function calcBMR({weight,height,age,sex}){
  if(!weight||!height||!age)return 0;
  const w=weight*.453592,h=height*2.54;
  return sex==="female"?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age+5;
}

  light:{label:"Lightly active",desc:"1-3 days/week",mult:1.375},

  active:{label:"Very active",desc:"6-7 days/week",mult:1.725},
  athlete:{label:"Athlete",desc:"2x training/day",mult:1.9},
};
function calcMacros(tdee,diet,gt){
  const cal=Math.round(tdee+({lose:-500,maintain:0,gain:300}[gt]||0));
  const sp={balanced:{p:.25,c:.5,f:.25},keto:{p:.3,c:.05,f:.65},"high-protein":{p:.4,c:.35,f:.25},"low-carb":{p:.3,c:.2,f:.5},vegan:{p:.2,c:.55,f:.25},vegetarian:{p:.22,c:.53,f:.25},mediterranean:{p:.25,c:.45,f:.3},paleo:{p:.35,c:.25,f:.4}};
  const r=sp[diet]||sp.balanced;
  return{calories:cal,protein:Math.round(cal*r.p/4),carbs:Math.round(cal*r.c/4),fat:Math.round(cal*r.f/9)};
}

async function lookupBarcode(code){
  const loc=FD[code.trim()];
  if(loc)return{name:loc.name,brand:loc.brand,calories:loc.cal,protein:loc.pro,carbs:loc.carb,fat:loc.fat,category:loc.cat,perishable:loc.perish,price:loc.price};
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const j=await res.json();
    if(j.status===1){
      const p=j.product;
      return{name:p.product_name||`Product ${code.slice(-4)}`,brand:p.brands||"",calories:Math.round(p.nutriments?.["energy-kcal_100g"]||0),protein:Math.round(p.nutriments?.proteins_100g||0),carbs:Math.round(p.nutriments?.carbohydrates_100g||0),fat:Math.round(p.nutriments?.fat_100g||0),category:"Other",perishable:false,price:0};
    }
  }catch{}
  return{name:`Product ${code.slice(-4)}`,brand:"",calories:0,protein:0,carbs:0,fat:0,category:"Other",perishable:false,price:0};
}

async function streamClaude(sys,usr,cb){
  const res=await fetch("/api/claude",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:sys,messages:[{role:"user",content:usr}]})
  });
  if(!res.ok){const err=await res.text();throw new Error("API error: "+err);}
  const data=await res.json();
  if(data.content&&data.content.length>0){
    for(const block of data.content){if(block.type==="text"&&block.text)cb(block.text);}
  }else if(data.error){throw new Error(data.error.message||"Claude API error");}
}

      </div>

        <button className="ob-back" onClick={()=>setStep(2)}>Back</button>
        <button className="ob-next" onClick={finish} disabled={loading||Object.keys(mealPrefs).length===0}>

  ];

  return(
    <div className="ob-wrap">

        <BloomLogo/>

      {steps[step]}
    </div>
  );
}

  function AccountModals({acctModal,setAcctModal,session,userName,setUserName,notify,supa}){
  const[form,setForm]=useState({});
  const[loading,setLoading]=useState(false);
  const[deleteConfirm,setDeleteConfirm]=useState("");
  if(!acctModal)return null;
  const handleProfileSave=async()=>{
    setLoading(true);
    const{error}=await supa.auth.updateUser({data:{full_name:form.name}});
    if(!error){
      await supa.from("profiles").update({name:form.name}).eq("id",session.user.id);
      setUserName(form.name);
      notify("Profile updated");
      setAcctModal(null);
    }else notify(error.message,"err");
    setLoading(false);
  };
  const handlePasswordSave=async()=>{
    if(form.password!==form.confirm){notify("Passwords don't match","err");return;}
    if((form.password||"").length<6){notify("Password must be at least 6 characters","err");return;}
    setLoading(true);
    const{error}=await supa.auth.updateUser({password:form.password});
    if(!error){notify("Password updated");setAcctModal(null);}
    else notify(error.message,"err");
    setLoading(false);
  };
  const handleDeleteAccount=async()=>{
    if(deleteConfirm!=="DELETE"){notify("Type DELETE to confirm","err");return;}
    setLoading(true);
    try{
      const uid=session.user.id;
      await supa.from("meal_ratings").delete().eq("user_id",uid);
      await supa.from("saved_meals").delete().eq("user_id",uid);
      await supa.from("weight_logs").delete().eq("user_id",uid);
      await supa.from("goals").delete().eq("user_id",uid);
      await supa.from("pantry_items").delete().eq("user_id",uid);
      await supa.from("profiles").delete().eq("id",uid);
      await supa.auth.signOut();
      notify("Account deleted");
    }catch(e){notify("Deletion failed — contact info@nutriqai.com","err");}
    setLoading(false);
  };
  return(
    <div className="modal-backdrop" onClick={()=>setAcctModal(null)}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        {acctModal==="profile"&&(
          <>
            <div className="modal-title">Edit profile</div>
            <div className="modal-sub">Update your display name</div>
            <div className="ob-field">
              <label className="ob-label">Display name</label>
              <input className="ob-input" defaultValue={userName} placeholder="Your name" onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            </div>
            <button className="btn-full" onClick={handleProfileSave} disabled={loading}>{loading?"Saving...":"Save changes"}</button>
            <button className="btn-ghost" style={{marginTop:8}} onClick={()=>setAcctModal(null)}>Cancel</button>
          </>
        )}
        {acctModal==="password"&&(
          <>
            <div className="modal-title">Change password</div>
            <div className="modal-sub">Choose a new password for your account</div>
            <div className="ob-field">
              <label className="ob-label">New password</label>
              <input className="ob-input" type="password" placeholder="At least 6 characters" onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
            </div>
            <div className="ob-field">
              <label className="ob-label">Confirm password</label>
              <input className="ob-input" type="password" placeholder="Repeat new password" onChange={e=>setForm(f=>({...f,confirm:e.target.value}))}/>
            </div>
            <button className="btn-full" onClick={handlePasswordSave} disabled={loading}>{loading?"Updating...":"Update password"}</button>
            <button className="btn-ghost" style={{marginTop:8}} onClick={()=>setAcctModal(null)}>Cancel</button>
          </>
        )}
        {acctModal==="subscription"&&(
          <>
            <div className="modal-title">Manage subscription</div>
            <div className="modal-sub">Your current plan</div>
            <div style={{background:"var(--plumLL)",border:"1px solid var(--plum3)22",borderRadius:14,padding:16,marginBottom:16}}>
              <div style={{fontSize:13,color:"var(--muted)",marginBottom:4}}>Current plan</div>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:"var(--plum)",fontWeight:600}}>Free</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>3 meal plan generations per month</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {[["Core","$4.99/mo","Unlimited plans · Full pantry"],["Family","$8.99/mo","Everything + household sharing"],["Premium","$12.99/mo","Everything + grocery ordering + AI images"]].map(([name,price,desc])=>(
                <div key={name} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:14,color:"var(--text)"}}>{name}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>{desc}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontWeight:500,color:"var(--plum2)"}}>{price}</div>
                    <button className="btn-sm" style={{fontSize:10,padding:"3px 8px",marginTop:4}}>Upgrade</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,color:"var(--muted)",textAlign:"center",marginBottom:16}}>Subscription billing coming soon via App Store</div>
            <button className="btn-ghost" onClick={()=>setAcctModal(null)}>Close</button>
          </>
        )}
        {acctModal==="delete"&&(
          <>
            <div className="modal-title" style={{color:"var(--red)"}}>Delete account</div>
            <div className="modal-sub">This will permanently delete all your data. This cannot be undone.</div>
            <div style={{background:"var(--roseL)",border:"1px solid var(--rose)44",borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:13,color:"var(--red)"}}>
              All your data will be permanently deleted within 30 days.
            </div>
            <div className="ob-field">
              <label className="ob-label">Type DELETE to confirm</label>
              <input className="ob-input" placeholder="DELETE" value={deleteConfirm} onChange={e=>setDeleteConfirm(e.target.value)} style={{borderColor:deleteConfirm==="DELETE"?"var(--red)":"var(--border)"}}/>
            </div>
            <button className="btn-full red" onClick={handleDeleteAccount} disabled={loading||deleteConfirm!=="DELETE"}>
              {loading?"Deleting...":"Permanently delete my account"}
            </button>
            <button className="btn-ghost" style={{marginTop:8}} onClick={()=>setAcctModal(null)}>Cancel</button>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const[session,setSession]=useState(undefined);

  const[needsOnboard,setNeedsOnboard]=useState(false);
  const[tab,setTab]=useState("home");

  const[goals,setGoals]=useState(()=>DB.get("nq_g",DG));
  const[weights,setWeights]=useState(()=>DB.get("nq_w",[]));
  const[meal,setMeal]=useState(()=>DB.get("nq_m",null));
  const[shop,setShop]=useState(()=>DB.get("nq_s",[]));
  const[toast,setToast]=useState(null);
  const[showAcctMenu,setShowAcctMenu]=useState(false);
  const[acctModal,setAcctModal]=useState(null); // profile | password | subscription | delete
  const[acctForm,setAcctForm]=useState({});

  const[pantryEnabled,setPantryEnabled]=useState(()=>DB.get("nq_pantry_on",true));
  const[preferredStore,setPreferredStore]=useState(()=>DB.get("nq_store","kroger"));

  useEffect(()=>{
    supa.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session)loadProfile(session.user.id);
    });
    const{data:{subscription}}=supa.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session)loadProfile(session.user.id);
      else{setProfile(null);setNeedsOnboard(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── CLEAN loadProfile — single source of truth: onboarding_complete in DB ──
  const loadProfile=async(uid)=>{
    const{data,error}=await supa.from("profiles").select("*").eq("id",uid).maybeSingle();
    if(error)console.error("loadProfile error:",error);
    if(!data||!data.onboarding_complete){
      setNeedsOnboard(true);
      return;
    }
    setProfile(data);
    const{data:g}=await supa.from("goals").select("*").eq("user_id",uid).maybeSingle();
    if(g){
      setGoals({
        weight:g.weight,goalWeight:g.goal_weight,height:g.height,age:g.age,
        sex:g.sex,activity:g.activity,goalType:g.goal_type,diet:g.diet,
        allergies:g.allergies||[],householdSize:g.household_size,
        meal_cuisines:g.meal_cuisines||[],meal_preferences:g.meal_preferences||{}
      });
    }
    if(data.household_id)loadPantry(data.household_id);
    loadWeights(uid);
  };

  const loadPantry=async(hid)=>{
    const{data}=await supa.from("pantry_items").select("*").eq("household_id",hid).order("created_at",{ascending:false});
    if(data&&data.length>0)setPantry(data.map(i=>({id:i.id,name:i.name,brand:i.brand,calories:i.calories,protein:i.protein,carbs:i.carbs,fat:i.fat,category:i.category,perishable:i.perishable,price:i.price,qty:i.qty,unit:i.unit,expiry:i.expiry?new Date(i.expiry).getTime():null,by:i.added_by,added:new Date(i.created_at).getTime()})));
  };

  const loadWeights=async(uid)=>{
    const{data}=await supa.from("weight_logs").select("*").eq("user_id",uid).order("logged_at",{ascending:true});
    if(data)setWeights(data.map(w=>({date:w.logged_at,weight:w.weight})));
  };

  const saveGoals=async(g)=>{
    if(!session)return;
    const{data:prof}=await supa.from("profiles").select("household_id").eq("id",session.user.id).maybeSingle();
    const{error}=await supa.from("goals").upsert({
      user_id:session.user.id,household_id:prof?.household_id,
      weight:g.weight||0,goal_weight:g.goalWeight||0,height:g.height||0,age:g.age||0,
      sex:g.sex||"female",activity:g.activity||"moderate",goal_type:g.goalType||"lose",
      diet:g.diet||"balanced",allergies:g.allergies||[],household_size:g.householdSize||1,
      meal_cuisines:g.meal_cuisines||[],meal_preferences:g.meal_preferences||{},
      updated_at:new Date().toISOString()
    },{onConflict:"user_id",ignoreDuplicates:false});
    if(error)console.error("saveGoals error:",error);
  };

  const savePantryItem=async(item)=>{
    if(!session)return item;
    const{data:prof}=await supa.from("profiles").select("household_id").eq("id",session.user.id).maybeSingle();
    const{data}=await supa.from("pantry_items").insert({household_id:prof?.household_id,name:item.name,brand:item.brand,calories:item.calories,protein:item.protein,carbs:item.carbs,fat:item.fat,category:item.category,perishable:item.perishable,price:item.price||0,qty:item.qty,unit:item.unit,expiry:item.expiry?new Date(item.expiry).toISOString():null,added_by:item.by||"Me"}).select().single();

useEffect(()=>{setUserName(profile?.name||session?.user?.email?.split("@")[0]||"");},[profile,session]);

    {id:"scan",label:"Scan",icon:(on)=>I.scan(on?"#4a1a6e":"#c0b0d0")},

/* HOME */
function HomeTab({pantry,goals,weights,meal,macros,setTab,userName,notify}){
  const today=new Date().toISOString().split("T")[0];
  const latest=weights.length>0?weights[weights.length-1].weight:null;
  const startWeight=weights.length>0?weights[0].weight:null;
  const weightChange=latest&&startWeight?(latest-startWeight).toFixed(1):null;
  const toGoal=latest&&goals.goalWeight?(latest-goals.goalWeight).toFixed(1):null;
  const expiring=pantry.filter(i=>{const d=du(i.expiry);return d!==null&&d<=3;});
  const outOfStock=pantry.filter(i=>i.qty<=1);
  const hasMeal=meal&&meal.days&&meal.days.length>0;
  const todayMeals=hasMeal?meal.days[0]:null;
  const greeting=()=>{
    const h=new Date().getHours();
    if(h<12)return"Good morning";
    if(h<17)return"Good afternoon";
    return"Good evening";
  };
 
  // Estimate savings: avg meal costs $12 eating out vs $4 cooking
  const mealsPlanned=hasMeal?meal.days.length*4:0;
  const estimatedSavings=mealsPlanned*8;
 
  return(
    <div className="page">
      {/* GREETING */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:2}}>{greeting()}</div>
        <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:32,fontWeight:600,color:"var(--plum)",lineHeight:1.1}}>
          {userName?userName.split(" ")[0]:"Welcome back"}
        </div>
      </div>
 
      {/* KPI GRID */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
 
        {/* WEIGHT */}
        <div className="card" style={{margin:0,cursor:"pointer"}} onClick={()=>setTab("goals")}>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Weight</div>
          {latest?(
            <>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:600,color:"var(--plum)",lineHeight:1}}>
                {latest}<span style={{fontSize:13,fontWeight:400,color:"var(--muted)"}}>lbs</span>
              </div>
              {weightChange!==null&&(
                <div style={{fontSize:12,marginTop:4,fontWeight:500,color:+weightChange<0?"var(--sage)":"var(--orange)"}}>
                  {+weightChange<0?"▼":"▲"} {Math.abs(weightChange)} lbs total
                </div>
              )}
              {toGoal&&+toGoal>0&&(
                <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{toGoal} lbs to goal</div>
              )}
              {toGoal&&+toGoal<=0&&(
                <div style={{fontSize:11,color:"var(--sage)",marginTop:2,fontWeight:500}}>Goal reached!</div>
              )}
            </>
          ):(
            <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>Log your weight</div>
          )}
        </div>
 
        {/* MEALS THIS WEEK */}
        <div className="card" style={{margin:0,cursor:"pointer"}} onClick={()=>setTab("meals")}>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Meal plan</div>
          {hasMeal?(
            <>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:600,color:"var(--plum)",lineHeight:1}}>
                {meal.days.length}<span style={{fontSize:13,fontWeight:400,color:"var(--muted)"}}> days</span>
              </div>
              <div style={{fontSize:12,color:"var(--sage)",marginTop:4,fontWeight:500}}>Plan ready</div>
              <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{macros.calories} kcal target</div>
            </>
          ):(
            <>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,fontWeight:600,color:"var(--muted2)",lineHeight:1}}>No plan</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>Tap to generate</div>
            </>
          )}
        </div>
 
        {/* PANTRY HEALTH */}
        <div className="card" style={{margin:0,cursor:"pointer"}} onClick={()=>setTab("pantry")}>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Pantry</div>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:600,color:"var(--plum)",lineHeight:1}}>
            {pantry.length}<span style={{fontSize:13,fontWeight:400,color:"var(--muted)"}}> items</span>
          </div>
          {expiring.length>0?(
            <div style={{fontSize:12,color:"var(--orange)",marginTop:4,fontWeight:500}}>
              {expiring.length} expiring soon
            </div>
          ):(
            <div style={{fontSize:12,color:"var(--sage)",marginTop:4,fontWeight:500}}>All fresh</div>
          )}
        </div>
 
        {/* SAVINGS */}
        <div className="card" style={{margin:0}}>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Est. savings</div>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:600,color:"var(--sage)",lineHeight:1}}>
            ${estimatedSavings}
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>vs eating out this week</div>
        </div>
 
      </div>
 
      {/* TODAY'S MEALS */}
      {todayMeals&&(
        <div className="card" style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>

            <button className="btn-sm" onClick={()=>setTab("meals")} style={{fontSize:11,padding:"4px 10px"}}>Full plan</button>
          </div>
          {Object.entries(todayMeals.meals||{}).map(([type,m])=>(
            <div key={type} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <div style={{width:44,height:44,borderRadius:10,background:"var(--plumLL)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <div style={{fontSize:9,fontWeight:500,color:"var(--plum2)",textTransform:"uppercase",letterSpacing:.5,textAlign:"center",lineHeight:1.3}}>{type}</div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:15,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{m.calories} cal · P {m.protein}g · C {m.carbs}g · F {m.fat}g</div>
              </div>
            </div>
          ))}
        </div>
      )}
 
      {/* EXPIRING ALERT */}
      {expiring.length>0&&(
        <div style={{background:"#fef7ed",border:"1px solid #e8c97066",borderRadius:12,padding:"12px 14px",marginBottom:12,cursor:"pointer"}} onClick={()=>setTab("pantry")}>
          <div style={{fontSize:13,fontWeight:500,color:"#8a5a0a",marginBottom:4}}>Use these soon</div>
          <div style={{fontSize:12,color:"#8a5a0a"}}>{expiring.map(i=>i.name).join(", ")}</div>
        </div>
      )}
 
      {/* WEIGHT SPARKLINE */}
      {weights.length>1&&(
        <div className="card" style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div className="card-title" style={{margin:0}}>Weight trend</div>
            <button className="btn-sm" onClick={()=>setTab("goals")} style={{fontSize:11,padding:"4px 10px"}}>Log weight</button>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
            {(()=>{
              const pts=weights.slice(-14);
              const mn=Math.min(...pts.map(p=>p.weight));
              const mx=Math.max(...pts.map(p=>p.weight));
              const range=mx-mn||1;
              return pts.map((p,i,a)=>{
                const h=((p.weight-mn)/range)*44+8;
                const isLatest=i===a.length-1;
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:"100%",height:h,borderRadius:3,background:isLatest?"var(--plum2)":"var(--plum3)44",minHeight:4}}/>
                    {(i===0||isLatest)&&<span style={{fontSize:8,color:"var(--muted2)"}}>{p.weight}</span>}
                  </div>
                );
              });
            })()}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:"var(--muted)"}}>
            <span>{weights.slice(-14)[0]?.date?.slice(5)}</span>
            <span>today</span>
          </div>
        </div>
      )}
 
      {/* QUICK ACTIONS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <button className="btn-full" onClick={()=>setTab("meals")} style={{padding:14,fontSize:14}}>
          Generate meal plan
        </button>
        <button className="btn-full blue" onClick={()=>setTab("scan")} style={{padding:14,fontSize:14}}>
          Scan item
        </button>
      </div>
 
      {/* NO MEAL PLAN NUDGE */}
      {!hasMeal&&(
        <div style={{background:"var(--plumLL)",border:"1px solid var(--plum3)22",borderRadius:14,padding:16,textAlign:"center"}}>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:20,color:"var(--plum)",marginBottom:6}}>Ready to plan your week?</div>
          <div style={{fontSize:13,color:"var(--muted)",marginBottom:12}}>Generate a meal plan tailored to your pantry and {macros.calories} kcal target.</div>
          <button className="btn-full" onClick={()=>setTab("meals")}>Generate this week's plan</button>
        </div>
      )}
 
    </div>
  );
}
/* SCANNER */
function ScannerTab({pantry,setPantry,savePantryItem,deletePantryItem,updatePantryQty,notify}){
  const[mode,setMode]=useState("add");
  const[scanning,setScanning]=useState(false);
  const[code,setCode]=useState("");
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[qty,setQty]=useState(1);
  const[unit,setUnit]=useState("item");
  const[expiry,setExpiry]=useState("");
  const[manual,setManual]=useState(false);
  const[mf,setMf]=useState({name:"",brand:"",calories:"",protein:"",carbs:"",fat:"",category:"Other"});
  const[camErr,setCamErr]=useState("");
  const[scanStatus,setScanStatus]=useState("Point camera at a barcode");
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const rafRef=useRef(null);
  const scanningRef=useRef(false);

  const stopCamera=useCallback(()=>{
    scanningRef.current=false;
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setScanning(false);
  },[]);

  const startCamera=useCallback(async()=>{
    setCamErr("");setScanStatus("Opening camera...");setScanning(true);scanningRef.current=true;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=stream;
      const vid=videoRef.current;
      vid.srcObject=stream;vid.setAttribute("playsinline","");vid.muted=true;
      await vid.play();
      setScanStatus("Point camera at a barcode");
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d",{willReadFrequently:true});
      let frameN=0;
      const tick=async()=>{
        if(!scanningRef.current)return;
        frameN++;
        if(frameN%10===0&&vid.readyState>=2&&vid.videoWidth>0){
          canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;ctx.drawImage(vid,0,0);
          try{
            const blob=await new Promise(res=>canvas.toBlob(res,"image/jpeg",0.8));
            if(blob&&window.ZXingWASM){
              const results=await window.ZXingWASM.readBarcodes(blob,{formats:["EAN-13","EAN-8","UPC-A","UPC-E","Code128","Code39","QRCode"],tryHarder:true});
              if(results&&results.length>0&&results[0].text){const txt=results[0].text;stopCamera();setCode(txt);doLookup(txt);return;}
            }
          }catch(e){}
        }
        rafRef.current=requestAnimationFrame(tick);
      };
      rafRef.current=requestAnimationFrame(tick);
    }catch(err){
      setScanning(false);scanningRef.current=false;
      if(err.name==="NotAllowedError")setCamErr("Camera permission denied. In Safari: Settings > Safari > Camera > Allow.");
      else if(err.name==="NotFoundError")setCamErr("No camera found on this device.");
      else setCamErr("Camera error: "+err.message);
    }
  },[]);

  useEffect(()=>()=>stopCamera(),[]);

  const doLookup=async c=>{
    if(!c.trim())return;
    setLoading(true);setResult(null);
    setResult(await lookupBarcode(c.trim()));
    setLoading(false);
  };

  const confirm=()=>{
    const item=manual?{name:mf.name,brand:mf.brand,calories:+mf.calories,protein:+mf.protein,carbs:+mf.carbs,fat:+mf.fat,category:mf.category,perishable:!!expiry,price:0}:result;
    if(!item)return;
    if(mode==="add"){
      const ex=pantry.find(p=>p.name===item.name);
      if(ex){setPantry(p=>p.map(i=>i.id===ex.id?{...i,qty:i.qty+qty}:i));notify("Updated: "+item.name);}
      else{setPantry(p=>[...p,{id:Date.now()+"", ...item,qty,unit,added:Date.now(),expiry:expiry?new Date(expiry).getTime():null,by:"Me"}]);notify("Added: "+item.name);}
    }else{
      const ex=pantry.find(p=>p.name===item.name);
      if(!ex){notify("Not in pantry","err");return;}
      setPantry(p=>p.map(i=>i.id===ex.id?{...i,qty:Math.max(0,i.qty-qty)}:i).filter(i=>i.qty>0));
      notify("Used: "+item.name);
    }
    setResult(null);setCode("");setExpiry("");setQty(1);
  };

  return(
    <div className="page">
      <div className="page-label">Scanner</div>
      <h1 className="page-title">Add or use items</h1>
      <div className="seg">
        <button className={`seg-btn${mode==="add"?" on":""}`} onClick={()=>setMode("add")}>+ Add to pantry</button>
        <button className={`seg-btn red${mode==="use"?" on":""}`} onClick={()=>setMode("use")}>- Mark as used</button>
      </div>
      <div className="vf">
        {scanning?(
          <>
            <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover"}} playsInline muted autoPlay/>
            <div className="vf-overlay">
              <div className="vf-frame">
                <div className="vf-corner" style={{top:0,left:0,borderWidth:"2.5px 0 0 2.5px"}}/>
                <div className="vf-corner" style={{top:0,right:0,borderWidth:"2.5px 2.5px 0 0"}}/>
                <div className="vf-corner" style={{bottom:0,left:0,borderWidth:"0 0 2.5px 2.5px"}}/>
                <div className="vf-corner" style={{bottom:0,right:0,borderWidth:"0 2.5px 2.5px 0"}}/>
                <div className="vf-scan"/>
              </div>
              <div className="vf-hint">{scanStatus}</div>
            </div>
            <button className="vf-stop" onClick={stopCamera}>X Stop</button>
          </>
        ):(
          <div className="vf-placeholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#6b2f9a66" strokeWidth="1.5" strokeLinecap="round"><path d="M3 8V5a2 2 0 012-2h2M19 3h2a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M8 21H5a2 2 0 01-2-2v-3"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            <button className="btn-full" style={{width:"auto",padding:"13px 28px",fontSize:15}} onClick={startCamera}>Tap to scan barcode</button>
            {camErr&&<p style={{fontSize:12,color:"#c2780a",marginTop:8,textAlign:"center",padding:"0 16px"}}>{camErr}</p>}
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input style={{flex:1,fontFamily:"monospace"}} placeholder="Or type barcode number..." value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLookup(code)}/>
        <button className="btn-sm" style={{padding:"0 18px",height:46,display:"flex",alignItems:"center",gap:6,borderRadius:12}} onClick={()=>doLookup(code)} disabled={loading}>
          {loading?<span className="spin" style={{width:12,height:12,borderTopColor:"#6b2f9a",borderColor:"#d4a0e8"}}/>:"Look up"}
        </button>
      </div>
      <p className="section-label" style={{marginBottom:8}}>Sample items to test</p>
      <div className="chips" style={{marginBottom:20}}>
        {Object.entries(FD).slice(0,7).map(([bc,f])=>(
          <button key={bc} className="chip" onClick={()=>{setCode(bc);doLookup(bc);}}>{f.name.split(" ").slice(0,2).join(" ")}</button>
        ))}
      </div>
      {result&&(
        <div className="result-card">
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div className="result-icon">{(CAT_ICON[result.category]||I.other)()}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:500,fontSize:16,color:"var(--text)",marginBottom:2}}>{result.name}</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>{result.brand}{result.price>0&&<span style={{marginLeft:8,color:"var(--sage)",fontWeight:500}}>${result.price.toFixed(2)}</span>}</div>
            </div>
          </div>
          <div className="macro-grid">
            {[["Cal",result.calories,""],["Protein",result.protein,"g"],["Carbs",result.carbs,"g"],["Fat",result.fat,"g"]].map(([k,v,u])=>(
              <div key={k} className="macro-box"><div className="macro-val">{v}{u}</div><div className="macro-lbl">{k}</div></div>
            ))}
          </div>
          <div className="qty-row">
            <button className="qty-btn" onClick={()=>setQty(q=>Math.max(1,q-1))}>-</button>
            <span className="qty-num">{qty}</span>
            <button className="qty-btn" onClick={()=>setQty(q=>q+1)}>+</button>
            <input style={{flex:1}} value={unit} onChange={e=>setUnit(e.target.value)} placeholder="unit"/>
          </div>
          {mode==="add"&&(
            <div style={{marginBottom:12}}>
              <label className="input-label">Expiry date (optional)</label>
              <input type="date" value={expiry} onChange={e=>setExpiry(e.target.value)}/>
            </div>
          )}
          <button className={`btn-full${mode==="use"?" red":""}`} onClick={confirm}>{mode==="add"?"Add to pantry":"Mark as used"}</button>
        </div>
      )}
      <button className="btn-ghost" onClick={()=>setManual(!manual)}>{manual?"Hide manual entry":"Add item manually"}</button>
      {manual&&(
        <div className="manual-form">
          <div><label className="input-label">Item name *</label><input value={mf.name} onChange={e=>setMf(m=>({...m,name:e.target.value}))}/></div>
          <div><label className="input-label">Brand</label><input value={mf.brand} onChange={e=>setMf(m=>({...m,brand:e.target.value}))}/></div>
          <div className="form-row">
            <div><label className="input-label">Calories</label><input type="number" value={mf.calories} onChange={e=>setMf(m=>({...m,calories:e.target.value}))}/></div>
            <div><label className="input-label">Protein (g)</label><input type="number" value={mf.protein} onChange={e=>setMf(m=>({...m,protein:e.target.value}))}/></div>
          </div>
          <div className="form-row">
            <div><label className="input-label">Carbs (g)</label><input type="number" value={mf.carbs} onChange={e=>setMf(m=>({...m,carbs:e.target.value}))}/></div>
            <div><label className="input-label">Fat (g)</label><input type="number" value={mf.fat} onChange={e=>setMf(m=>({...m,fat:e.target.value}))}/></div>
          </div>
          <div><label className="input-label">Category</label>
            <select value={mf.category} onChange={e=>setMf(m=>({...m,category:e.target.value}))}>
              {Object.keys(CAT_ICON).map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label className="input-label">Expiry date</label><input type="date" value={expiry} onChange={e=>setExpiry(e.target.value)}/></div>
          <button className="btn-full" onClick={confirm} disabled={!mf.name}>Add to pantry</button>
        </div>
      )}
    </div>
  );
}

/* PANTRY */
function PantryTab({pantry,setPantry,deletePantryItem,updatePantryQty,notify}){
  const[search,setSearch]=useState("");
  const[cat,setCat]=useState("all");
  const[sort,setSort]=useState("expiry");
  const cats=["all",...new Set(pantry.map(i=>i.category))];
  const filtered=pantry
    .filter(i=>cat==="all"||i.category===cat)
    .filter(i=>i.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>sort==="expiry"?(du(a.expiry)??999)-(du(b.expiry)??999):sort==="name"?a.name.localeCompare(b.name):b.added-a.added);
  const urgent=pantry.filter(i=>{const d=du(i.expiry);return d!==null&&d<=3;});
  return(
    <div className="page">
      <div className="page-label">Inventory</div>
      <h1 className="page-title">Your pantry</h1>
      <div className="stat-row">
        <div className="stat-pill"><span style={{fontWeight:500,color:"var(--plum2)"}}>{pantry.length}</span> items</div>
        <div className="stat-pill"><span style={{fontWeight:500,color:"var(--orange)"}}>{urgent.length}</span> expiring soon</div>
      </div>
      {urgent.length>0&&<div className="alert">Use these soon: {urgent.map(i=>i.name).join(", ")}</div>}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"0 12px"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input style={{flex:1,background:"none",border:"none",padding:"11px 0",fontSize:14,outline:"none"}} placeholder="Search pantry..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select style={{width:"auto"}} value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="expiry">Expiry</option>
          <option value="name">Name</option>
          <option value="added">Added</option>
        </select>
      </div>
      <div className="chips">
        {cats.map(c=><button key={c} className={`chip${cat===c?" on":""}`} onClick={()=>setCat(c)}>{c==="all"?"All items":c}</button>)}
      </div>
      {filtered.map(item=>{
        const days=du(item.expiry),color=uc(days);
        return(
          <div key={item.id} className="prow" style={{borderLeftColor:color||"var(--border)"}}>
            <div className="prow-icon">{(CAT_ICON[item.category]||I.other)()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="prow-name">{item.name}</div>
              <div className="prow-meta">
                <span>{item.brand}</span>
                {days!==null&&<span style={{color,fontWeight:500}}>{days<=0?"Expired":`${days}d left`}</span>}
                {item.price>0&&<span style={{color:"var(--sage)"}}>${item.price.toFixed(2)}</span>}
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[`${item.calories} cal`,`P ${item.protein}g`,`C ${item.carbs}g`,`F ${item.fat}g`].map(t=><span key={t} className="macro-pill">{t}</span>)}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <div className="qty-tag">{item.qty} {item.unit}</div>
              <div style={{display:"flex",gap:4}}>
                <button className="btn-use" onClick={()=>{const nq=Math.max(0,item.qty-1);if(nq===0){setPantry(p=>p.filter(i=>i.id!==item.id));if(deletePantryItem)deletePantryItem(item.id);}else{setPantry(p=>p.map(i=>i.id===item.id?{...i,qty:nq}:i));if(updatePantryQty)updatePantryQty(item.id,nq);}notify("Used");}}>Use</button>
                <button className="btn-del" onClick={()=>{setPantry(p=>p.filter(i=>i.id!==item.id));if(deletePantryItem)deletePantryItem(item.id);notify("Removed");}}>X</button>
              </div>
            </div>
          </div>
        );
      })}
      {filtered.length===0&&<div className="empty"><div className="empty-icon">{I.pantry("#b0a0be")}</div>Nothing found - scan something!</div>}
    </div>
  );
}

/* MEALS */
const MEAL_TYPE_LABELS={
  "Breakfast":"breakfast","Quick Breakfast":"quick_breakfast",
  "Lunch":"lunch","Meal Prep Lunch":"meal_prep_lunch",
  "Dinner":"dinner","Quick Dinner":"quick_dinner",
  "Snack":"snack","Smoothie":"smoothie",
};
 
function MealsTab({pantry,goals,macros,meal,setMeal,setShop,setTab,notify,session}){
  const[view,setView]=useState("plan"); // plan | generate | history | recipe
  const[phase,setPhase]=useState("prefs"); // prefs | generating | picking
  const[showPrefs,setShowPrefs]=useState(false);
  const[cuisines,setCuisines]=useState(goals.meal_cuisines||[]);
  const[mealPrefs,setMealPrefs]=useState(goals.meal_preferences||{});
  const[options,setOptions]=useState({});
  const[selected,setSelected]=useState({});
  const[stepIdx,setStepIdx]=useState(0);
  const[savedMeals,setSavedMeals]=useState([]);
  const[thisWeek,setThisWeek]=useState([]);
  const[loadingMeals,setLoadingMeals]=useState(false);
  const[activeRecipe,setActiveRecipe]=useState(null);
  const[genRecipe,setGenRecipe]=useState(false);
  const[historyFilter,setHistoryFilter]=useState("all");
  const[savedRatings,setSavedRatings]=useState([]);
 
  const toggleCuisine=c=>setCuisines(cs=>cs.includes(c)?cs.filter(x=>x!==c):[...cs,c]);
  const toggleMealType=t=>setMealPrefs(mp=>{const n={...mp};if(n[t])delete n[t];else n[t]=1;return n;});
  const setMealCount=(t,v)=>setMealPrefs(mp=>({...mp,[t]:Math.max(1,Math.min(7,+v||1))}));
 
  const mealTypeKeys=Object.keys(mealPrefs);
  const currentTypeLabel=mealTypeKeys[stepIdx]||"";
  const currentTypeKey=MEAL_TYPE_LABELS[currentTypeLabel]||currentTypeLabel.toLowerCase().replace(/\s+/g,"_");
  const currentOptions=options[currentTypeKey]||[];
  const currentSelected=selected[currentTypeKey]||[];
  const neededCount=mealPrefs[currentTypeLabel]||1;
  const isFull=currentSelected.length>=neededCount;
 
  // Load saved meals and this week on mount
  useEffect(()=>{
    if(!session)return;
    loadSavedMeals();
    loadRatings();
  },[session]);
 
  const loadSavedMeals=async()=>{
    setLoadingMeals(true);
    const{data}=await supa.from("saved_meals").select("*")
      .eq("user_id",session.user.id)
      .order("created_at",{ascending:false});
    if(data){
      setSavedMeals(data);
      setThisWeek(data.filter(m=>m.this_week));
    }
    setLoadingMeals(false);
  };
 
  const loadRatings=async()=>{
    const{data}=await supa.from("meal_ratings").select("*")
      .eq("user_id",session.user.id).limit(100);
    if(data)setSavedRatings(data);
  };
 
  const addToThisWeek=async(mealId)=>{
    await supa.from("saved_meals").update({this_week:true}).eq("id",mealId);
    setSavedMeals(ms=>ms.map(m=>m.id===mealId?{...m,this_week:true}:m));
    setThisWeek(tw=>[...tw,savedMeals.find(m=>m.id===mealId)]);
    notify("Added to this week");
  };
 
  const removeFromThisWeek=async(mealId)=>{
    await supa.from("saved_meals").update({this_week:false}).eq("id",mealId);
    setSavedMeals(ms=>ms.map(m=>m.id===mealId?{...m,this_week:false}:m));
    setThisWeek(tw=>tw.filter(m=>m.id!==mealId));
    notify("Removed from this week");
  };
 
  const deleteSavedMeal=async(mealId)=>{
    await supa.from("saved_meals").delete().eq("id",mealId);
    setSavedMeals(ms=>ms.filter(m=>m.id!==mealId));
    setThisWeek(tw=>tw.filter(m=>m.id!==mealId));
    notify("Meal removed");
  };
 
  const saveSelectedMeals=async(selections)=>{
    if(!session)return;
    const{data:prof}=await supa.from("profiles").select("household_id").eq("id",session.user.id).maybeSingle();
    const toInsert=[];
    Object.entries(selections).forEach(([typeKey,idxs])=>{
      const typeOpts=options[typeKey]||[];
      idxs.forEach(idx=>{
        const m=typeOpts[idx];
        if(m)toInsert.push({
          user_id:session.user.id,
          household_id:prof?.household_id,
          name:m.name,
          meal_type:typeKey,
          description:m.description,
          calories:m.calories,
          protein:m.protein,
          carbs:m.carbs,
          fat:m.fat,
          ingredients:m.ingredients||[],
          uses_pantry:m.uses_pantry||[],
          this_week:true,
        });
      });
    });
    if(toInsert.length>0){
      const{data}=await supa.from("saved_meals").insert(toInsert).select();
      if(data){
        setSavedMeals(ms=>[...data,...ms]);
        setThisWeek(tw=>[...tw,...data]);
      }
    }
    // Build shopping list from all this week's meals
 buildShoppingList([...thisWeek,...toInsert]);
    notify(`${toInsert.length} meals added to this week!`);
    setView("plan");
    setPhase("prefs");
    setOptions({});
    setSelected({});
    setStepIdx(0);
  };

  const buildShoppingList=(meals)=>{
    const allIngredients={};
    meals.forEach(m=>{
      const ings=Array.isArray(m.ingredients)?m.ingredients:[];
      ings.forEach(ing=>{
        const name=typeof ing==="string"?ing.replace(/^[\d./\s]+(cup|tbsp|tsp|oz|lb|g|kg|clove|cloves|slice|slices|can|cans|bunch|bunches|piece|pieces|medium|large|small)s?\s*/i,"").trim():ing;
        if(name)allIngredients[name.toLowerCase()]=(allIngredients[name.toLowerCase()]||0)+1;
      });
    });
    const pantryNames=pantry.map(p=>p.name.toLowerCase());
    const needed=Object.keys(allIngredients).filter(item=>!pantryNames.some(p=>p.includes(item)||item.includes(p)));
    const using=Object.keys(allIngredients).filter(item=>pantryNames.some(p=>p.includes(item)||item.includes(p)));
    if(using.length>0)notify(`Using ${using.length} pantry item${using.length!==1?"s":""} you already have`);
    setShop(needed.map(item=>({item,quantity:"as needed",reason:"For your meals this week",priority:"high"})));
  };
  const buildRatingContext=()=>{
    if(savedRatings.length===0)return"";
    const loved=savedRatings.filter(r=>r.rating===5).slice(0,5).map(r=>r.meal_name);
    const exclude=savedRatings.filter(r=>r.rating<=2).map(r=>r.meal_name);
    const modify=savedRatings.filter(r=>r.rating===3).slice(0,3).map(r=>`${r.meal_name}${r.note?` (${r.note})`:""}`);
    let ctx="";
    if(loved.length>0)ctx+=`User loves meals like: ${loved.join(", ")} — suggest inspired variations. `;
    if(modify.length>0)ctx+=`Improve these: ${modify.join(", ")}. `;
    if(exclude.length>0)ctx+=`NEVER suggest: ${exclude.join(", ")}. `;
    // Also exclude meals already in history to avoid repeats
    const recentNames=savedMeals.slice(0,20).map(m=>m.name);
    if(recentNames.length>0)ctx+=`Already in meal history (avoid repeating): ${recentNames.slice(0,10).join(", ")}. `;
    return ctx;
  };
 
  const generate=async()=>{
    if(mealTypeKeys.length===0){notify("Set meal preferences first","err");return;}
    setPhase("generating");
    const ps=pantry.map(i=>{const d=du(i.expiry);return`- ${i.name} (${i.qty} ${i.unit}${d!==null?`, expires ${d}d`:""})`;}).join("\n");
    const cuisineStr=cuisines.length?`Preferred cuisines: ${cuisines.join(", ")}.`:"";
    const ratingCtx=buildRatingContext();
    const optionsSpec=mealTypeKeys.map(t=>{
      const key=MEAL_TYPE_LABELS[t]||t.toLowerCase().replace(/\s+/g,"_");
      const count=Math.min((mealPrefs[t]||1)*2,10);
      return`"${key}": ${count} options`;
    }).join(", ");
    const exKey=MEAL_TYPE_LABELS[mealTypeKeys[0]]||"dinner";
   const sys=`You are a home cooking expert. Respond with ONLY raw JSON. No markdown, no backticks, no explanation.
Structure: {"options":{"${exKey}":[{"name":"...","description":"...","uses_pantry":["..."],"calories":500,"protein":35,"carbs":55,"fat":15,"ingredients":["1 cup rice","2 chicken breasts"]}]}}
Rules: suggest FAMILIAR, PRACTICAL home meals that real families actually cook — like "Chicken Stir Fry", "Beef Tacos", "Pasta Bolognese", "Grilled Salmon", "Chicken Soup". Avoid exotic or unusual combinations. Names under 5 words, descriptions under 10 words, 4-8 common grocery ingredients per meal. IMPORTANT for ingredients: always use the most specific raw form — write "boneless skinless chicken breast" not "chicken breast", "raw shrimp" not "shrimp", "93% lean ground beef" not "ground beef", "fresh salmon fillet" not "salmon". This ensures correct grocery store matching.`;
    const usr=`Generate meal options. Household: ${goals.householdSize}. Calorie target: ${macros.calories}/day. Goal: ${goals.goalType}. Diet: ${goals.diet}. Allergies: ${goals.allergies.join(",")||"none"}. ${cuisineStr} ${ratingCtx}
Generate: ${optionsSpec}.
Pantry (prioritize expiring): ${ps.split("\n").slice(0,8).join(", ")}.`;
    let full="";
    try{
      await streamClaude(sys,usr,c=>{full+=c;});
      const cleaned=full.replace(/```json/g,"").replace(/```/g,"").trim();
      const parsed=JSON.parse(cleaned);
      setOptions(parsed.options||{});
      setSelected({});
      setStepIdx(0);
      setPhase("picking");
    }catch(e){
      notify("Generation failed — try again","err");
      console.error(e,full);
      setPhase("prefs");
    }
  };
 
  const toggleOption=(typeKey,idx)=>{
    setSelected(s=>{
      const cur=s[typeKey]||[];
      const typeLabel=Object.keys(MEAL_TYPE_LABELS).find(k=>MEAL_TYPE_LABELS[k]===typeKey)||typeKey;
      const needed=mealPrefs[typeLabel]||1;
      if(cur.includes(idx))return{...s,[typeKey]:cur.filter(i=>i!==idx)};
      if(cur.length<needed)return{...s,[typeKey]:[...cur,idx]};
      return s;
    });
  };
 
  const advanceStep=()=>{
    if(stepIdx<mealTypeKeys.length-1)setStepIdx(s=>s+1);
    else saveSelectedMeals(selected);
  };
 
  const generateRecipe=async(mealItem)=>{
  // If recipe already saved, just show it
  if(mealItem.recipe){
    setActiveRecipe({...mealItem,...mealItem.recipe,loading:false});
    setView("recipe");
    return;
  }
  setActiveRecipe({...mealItem,loading:true});
  setView("recipe");
  const sys=`You are a chef. Respond with ONLY raw JSON. No markdown. Structure: {"title":"...","servings":4,"prep_time":"15 min","cook_time":"30 min","ingredients":[{"amount":"1 cup","name":"brown rice"}],"steps":["Step 1: ..."]}`;
  const usr=`Complete recipe for "${mealItem.name}" (${(mealItem.meal_type||"").replace(/_/g," ")}). Serves ${goals.householdSize}. Diet: ${goals.diet}. Known ingredients: ${(Array.isArray(mealItem.ingredients)?mealItem.ingredients:[]).join(", ")||"standard"}.`;
  let full="";
  try{
    await streamClaude(sys,usr,c=>{full+=c;});
    const cleaned=full.replace(/```json/g,"").replace(/```/g,"").trim();
    const recipe=JSON.parse(cleaned);
    setActiveRecipe({...mealItem,...recipe,loading:false});
    // Save recipe + update times_made
    if(mealItem.id){
      await supa.from("saved_meals").update({
        recipe,
        times_made:(mealItem.times_made||0)+1,
        last_made:new Date().toISOString().split("T")[0]
      }).eq("id",mealItem.id);
      // Update local state so next tap uses cached recipe
      setSavedMeals(ms=>ms.map(m=>m.id===mealItem.id?{...m,recipe,times_made:(m.times_made||0)+1}:m));
      setThisWeek(tw=>tw.map(m=>m.id===mealItem.id?{...m,recipe,times_made:(m.times_made||0)+1}:m));
    }
  }catch(e){
    notify("Recipe failed — try again","err");
    setView("plan");
  }
};
 
  const rateFromRecipe=async(rating)=>{
    if(!activeRecipe||!session)return;
    const{data:prof}=await supa.from("profiles").select("household_id").eq("id",session.user.id).maybeSingle();
    await supa.from("meal_ratings").delete().eq("user_id",session.user.id).eq("meal_name",activeRecipe.name).eq("meal_type",activeRecipe.meal_type||"");
    await supa.from("meal_ratings").insert({user_id:session.user.id,household_id:prof?.household_id,meal_name:activeRecipe.name,meal_type:activeRecipe.meal_type||"",rating,never_again:rating<=2});
    if(activeRecipe.id){
      await supa.from("saved_meals").update({rating}).eq("id",activeRecipe.id);
    }
    notify(rating>=4?"Glad you loved it!":"Got it — noted for next time");
    loadRatings();
  };
 
  const hasMealPrefs=Object.keys(mealPrefs).length>0;
  const allTypesDone=mealTypeKeys.every(t=>{
    const key=MEAL_TYPE_LABELS[t]||t.toLowerCase().replace(/\s+/g,"_");
    return(selected[key]||[]).length>=(mealPrefs[t]||1);
  });
 
  // ── RECIPE VIEW ──
  if(view==="recipe"&&activeRecipe){
    if(activeRecipe.loading)return(
      <div className="page" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:16}}>
        <span className="spin" style={{width:28,height:28,borderWidth:3,borderTopColor:"var(--plum)",borderColor:"var(--plum3)44"}}/>
        <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:"var(--plum)"}}>Writing your recipe...</div>
      </div>
    );
    return(
      <div className="page">
        <button className="btn-sm" style={{marginBottom:16}} onClick={()=>setView("plan")}>Back to plan</button>
        <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:30,fontWeight:600,color:"var(--plum)",marginBottom:4}}>{activeRecipe.title||activeRecipe.name}</div>
        <div style={{display:"flex",gap:16,fontSize:12,color:"var(--muted)",marginBottom:20,flexWrap:"wrap"}}>
          {activeRecipe.servings&&<span>Serves {activeRecipe.servings}</span>}
          {activeRecipe.prep_time&&<span>Prep: {activeRecipe.prep_time}</span>}
          {activeRecipe.cook_time&&<span>Cook: {activeRecipe.cook_time}</span>}
          <span style={{color:"var(--rose)",textTransform:"capitalize"}}>{(activeRecipe.meal_type||"").replace(/_/g," ")}</span>
        </div>
        <div className="card" style={{marginBottom:14}}>
          <div className="card-title">Ingredients</div>
          {(activeRecipe.ingredients||[]).map((ing,i)=>(
            <div key={i} style={{display:"flex",gap:12,padding:"7px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
              <span style={{fontWeight:500,color:"var(--plum2)",minWidth:80,flexShrink:0}}>{ing.amount}</span>
              <span style={{color:"var(--text)"}}>{ing.name}</span>
            </div>
          ))}
        </div>
        <div className="card" style={{marginBottom:14}}>
          <div className="card-title">Instructions</div>
          {(activeRecipe.steps||[]).map((step,i)=>(
            <div key={i} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:"var(--plumL)",border:"1px solid var(--plum3)44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:"var(--plum2)",flexShrink:0,marginTop:1}}>{i+1}</div>
              <div style={{fontSize:13,color:"var(--text)",lineHeight:1.7,flex:1}}>{step}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-title">How was it?</div>
          <div style={{display:"flex",gap:8}}>
            {[["Never again",1],["Meh",2],["OK",3],["Good",4],["Loved it",5]].map(([label,r])=>(
              <button key={r} onClick={()=>rateFromRecipe(r)}
                style={{flex:1,background:activeRecipe.rating===r?"var(--plumL)":"var(--warm)",border:`1px solid ${activeRecipe.rating===r?"var(--plum3)":"var(--border)"}`,borderRadius:10,padding:"8px 4px",fontSize:11,color:activeRecipe.rating===r?"var(--plum2)":"var(--muted)",fontWeight:activeRecipe.rating===r?500:400,cursor:"pointer",fontFamily:"'DM Sans',system-ui,sans-serif",transition:"all .15s"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }
 
  // ── PICKING VIEW ──
  if(view==="generate"&&phase==="picking"){
    return(
      <div className="page">
        <div style={{display:"flex",gap:4,marginBottom:20}}>
          {mealTypeKeys.map((t,i)=>{
            const key=MEAL_TYPE_LABELS[t]||t.toLowerCase().replace(/\s+/g,"_");
            const done=(selected[key]||[]).length>=(mealPrefs[t]||1);
            return<div key={t} style={{flex:1,height:3,borderRadius:3,background:done?"var(--sage)":i===stepIdx?"var(--plum2)":"var(--border)",transition:"background .3s"}}/>;
          })}
        </div>
        <div className="step-header">
          {stepIdx>0&&<button style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:22,padding:0}} onClick={()=>setStepIdx(s=>s-1)}>←</button>}
          <div style={{flex:1}}>
            <div className="step-counter">Step {stepIdx+1} of {mealTypeKeys.length}</div>
            <div className="step-title">Pick your {currentTypeLabel.toLowerCase()}s</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div className={`sel-counter${isFull?" full":""}`}>
            {currentSelected.length} of {neededCount} selected{isFull?" ✓":""}
